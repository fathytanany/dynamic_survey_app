version: "3.9"

x-app-env: &app-env
  env_file: .env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  init:
    build: .
    <<: *app-env
    command: sh -c "python manage.py migrate --noinput "
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    restart: "no"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  web:
    build: .
    <<: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  worker:
    build: .
    <<: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  beat:
    build: .
    <<: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

  flower:
    build: .
    <<: *app-env
    depends_on:
      init:
        condition: service_completed_successfully
    command: celery -A config flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development

volumes:
  postgres_data:
  redis_data:
  static_volume:
