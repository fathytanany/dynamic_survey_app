[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests/unit/test_*.py tests/integration/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -v
    --cov=apps
    --cov=services
    --cov-report=term-missing
    --cov-fail-under=85
markers =
    unit: Pure unit tests (isolated, may still use DB)
    integration: Full HTTP stack tests via APIClient
    slow: Tests that are intentionally slow
