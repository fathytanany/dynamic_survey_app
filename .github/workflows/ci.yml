name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: survey_platform_test
          POSTGRES_USER: survey_user
          POSTGRES_PASSWORD: survey_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U survey_user -d survey_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_NAME: survey_platform_test
      DB_USER: survey_user
      DB_PASSWORD: survey_password
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_SSLMODE: disable
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      CORS_ALLOWED_ORIGINS: ""
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      EMAIL_HOST: ""
      EMAIL_PORT: "587"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      EMAIL_USE_TLS: "True"
      DEFAULT_FROM_EMAIL: noreply@survey-platform.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Generate Fernet key for CI
        if: ${{ env.ENCRYPTION_KEY == '' }}
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "ENCRYPTION_KEY=$KEY" >> $GITHUB_ENV

      - name: Write .env for python-decouple
        run: |
          cat > .env <<EOF
          SECRET_KEY=${SECRET_KEY}
          DEBUG=${DEBUG}
          ALLOWED_HOSTS=${ALLOWED_HOSTS}
          DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_SSLMODE=${DB_SSLMODE}
          REDIS_URL=${REDIS_URL}
          CELERY_BROKER_URL=${CELERY_BROKER_URL}
          CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
          ENCRYPTION_KEY=${ENCRYPTION_KEY}
          CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
          EMAIL_BACKEND=${EMAIL_BACKEND}
          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=${EMAIL_PORT}
          EMAIL_HOST_USER=${EMAIL_HOST_USER}
          EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
          EMAIL_USE_TLS=${EMAIL_USE_TLS}
          DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
          EOF

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest
